name: Update iRacing Data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required iRacing secrets
        env:
          IRACING_USERNAME: ${{ secrets.IRACING_USERNAME }}
          IRACING_PASSWORD: ${{ secrets.IRACING_PASSWORD }}
          IRACING_CLIENT_ID: ${{ secrets.IRACING_CLIENT_ID }}
          IRACING_CLIENT_SECRET: ${{ secrets.IRACING_CLIENT_SECRET }}
        run: |
          missing=""
          for name in IRACING_USERNAME IRACING_PASSWORD IRACING_CLIENT_ID IRACING_CLIENT_SECRET; do
            if [ -z "${!name}" ]; then
              missing="$missing $name"
            fi
          done

          if [ -n "$missing" ]; then
            echo "Missing required GitHub Action secrets:$missing"
            exit 1
          fi

      - name: Fetch and parse all data
        env:
          IRACING_USERNAME: ${{ secrets.IRACING_USERNAME }}
          IRACING_PASSWORD: ${{ secrets.IRACING_PASSWORD }}
          IRACING_CLIENT_ID: ${{ secrets.IRACING_CLIENT_ID }}
          IRACING_CLIENT_SECRET: ${{ secrets.IRACING_CLIENT_SECRET }}
        run: |
          npm run fetch-data
          npm run fetch-past
          npm run parse-data
          npm run parse-past

      - name: Build check
        run: npm run build

      - name: Commit and push data changes
        run: |
          if git diff --quiet; then
            echo "No data changes detected."
            exit 0
          fi

          npm run bump:release:data

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A src/ir-data package.json package-lock.json CHANGELOG.md
          git commit -m "[actions] Refresh iRacing data (#${{ github.run_number }})"
          git push
